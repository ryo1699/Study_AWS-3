name: Build Study AWS 3 Task 3 Batch Image

on:
  push:
    branches: [main]
    paths:
      - "Study_AWS-3_3/batch/**"
      - ".github/workflows/study-aws-3-3-batch-image.yml"
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  BATCH_REPOSITORY: ${{ vars.ECR_REPOSITORY_BATCH }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push batch image
        working-directory: Study_AWS-3_3/batch
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$BATCH_REPOSITORY:$IMAGE_TAG" -t "$ECR_REGISTRY/$BATCH_REPOSITORY:latest" .
          docker push "$ECR_REGISTRY/$BATCH_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$BATCH_REPOSITORY:latest"

